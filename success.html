<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Wibilow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F8F9FA;color:#111827;font-family:'Inter',sans-serif;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border:1px solid #E9ECEF;border-radius:20px;padding:40px 36px;
  max-width:600px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.check{width:72px;height:72px;background:#ECFDF5;border-radius:50%;display:flex;
  align-items:center;justify-content:center;margin:0 auto 20px;font-size:2rem;}
h1{font-size:1.6rem;font-weight:700;color:#111827;margin-bottom:6px;text-align:center;}
.subtitle{color:#6B7280;font-size:0.92rem;line-height:1.6;margin-bottom:28px;text-align:center;}

.section{background:#F8F9FA;border:1px solid #E9ECEF;border-radius:12px;padding:18px;margin-bottom:16px;}
.section-title{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;
  color:#6B7280;margin-bottom:12px;}

.detail-row{display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;font-size:0.88rem;}
.detail-row+.detail-row{border-top:1px solid #E9ECEF;}
.detail-label{color:#6B7280;font-weight:500;}
.detail-value{font-weight:600;color:#111827;text-align:right;max-width:60%;word-break:break-word;}
.detail-value.blue{font-family:'JetBrains Mono',monospace;color:#2563EB;font-weight:700;}

.item-row{display:flex;align-items:center;gap:10px;padding:10px 0;}
.item-row+.item-row{border-top:1px solid #E9ECEF;}
.item-icon{width:44px;height:44px;background:#fff;border:1px solid #E9ECEF;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-name{font-size:0.86rem;font-weight:600;color:#111827;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.item-qty{font-size:0.76rem;color:#6B7280;margin-top:2px;}
.item-price{font-family:'JetBrains Mono',monospace;font-size:0.95rem;color:#2563EB;
  font-weight:700;flex-shrink:0;}

.total-row{display:flex;justify-content:space-between;align-items:center;
  padding:14px 0 0;margin-top:8px;border-top:2px solid #E9ECEF;}
.total-label{font-size:0.95rem;font-weight:700;color:#111827;}
.total-value{font-family:'JetBrains Mono',monospace;font-size:1.4rem;color:#2563EB;font-weight:700;}

.info-box{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;padding:14px 16px;
  margin-bottom:20px;font-size:0.84rem;color:#1D4ED8;line-height:1.6;}

.btn{display:block;text-align:center;background:#2563EB;color:#fff;padding:13px 32px;border-radius:10px;
  font-weight:600;font-size:0.95rem;text-decoration:none;transition:background 0.2s;margin-bottom:12px;}
.btn:hover{background:#1D4ED8;}
.logo{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;
  display:block;text-decoration:none;text-align:center;}
.logo .w{color:#2563EB;}.logo .l{color:#0891B2;}

.loading{color:#6B7280;font-size:0.88rem;padding:20px 0;text-align:center;}
.error-msg{color:#DC2626;font-size:0.84rem;text-align:center;padding:12px;
  background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;margin-bottom:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="check">✓</div>
  <h1>Order Confirmed!</h1>
  <p class="subtitle">Thank you for shopping with Wibilow.</p>
  <div id="orderContent"><div class="loading">Loading your order details…</div></div>
  <div class="info-box">
    📦 Your items ship directly from our global suppliers. Delivery typically takes <strong>7–21 business days</strong>. You'll receive tracking info via email once your order ships.
  </div>
  <a href="/" class="btn">Continue Shopping →</a>
  <a href="/" class="logo"><span class="w">Wibi</span><span class="l">low</span></a>
</div>

<script>
async function loadOrder(){
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  const container = document.getElementById('orderContent');

  if(!sessionId){
    container.innerHTML='<div class="error-msg">No order reference found.</div>';
    return;
  }

  try{
    const res = await fetch('/api/receipt?session_id='+encodeURIComponent(sessionId));
    if(!res.ok) throw new Error('Failed to load order');
    const data = await res.json();
    if(data.error) throw new Error(data.error);

    const session = data.session;
    const items = data.items||[];
    const shipping = session.shipping_details||session.shipping||{};
    const addr = shipping.address||session.customer_details?.address||{};
    const name = shipping.name||session.customer_details?.name||'Customer';
    const email = session.customer_details?.email||'';
    const total = ((session.amount_total||0)/100).toFixed(2);
    const orderId = session.id ? session.id.slice(-12).toUpperCase() : 'N/A';

    let html = '';

    // Order info
    html += `<div class="section">
      <div class="section-title">Order Info</div>
      <div class="detail-row"><span class="detail-label">Order ID</span><span class="detail-value blue">#${orderId}</span></div>
      <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${new Date().toLocaleDateString()}</span></div>
      <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="color:#059669;">✓ Confirmed</span></div>
    </div>`;

    // Customer info
    html += `<div class="section">
      <div class="section-title">Customer</div>
      <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${name}</span></div>
      ${email?`<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${email}</span></div>`:''}
      ${addr.line1?`<div class="detail-row"><span class="detail-label">Ship to</span><span class="detail-value">${[addr.line1,addr.line2,addr.city,addr.state,addr.postal_code,addr.country].filter(Boolean).join(', ')}</span></div>`:''}
    </div>`;

    // Items
    if(items.length){
      html += `<div class="section">
        <div class="section-title">Items Ordered (${items.length})</div>`;
      items.forEach(item=>{
        const price = ((item.amount_total||item.price?.unit_amount||0)/100).toFixed(2);
        const qty = item.quantity||1;
        html += `<div class="item-row">
          <div class="item-icon">🛍️</div>
          <div class="item-info">
            <div class="item-name">${item.description||'Product'}</div>
            <div class="item-qty">Qty: ${qty}</div>
          </div>
          <div class="item-price">$${price}</div>
        </div>`;
      });
      html += `<div class="total-row">
        <span class="total-label">Total Paid</span>
        <span class="total-value">$${total}</span>
      </div></div>`;
    }

    container.innerHTML = html;

  }catch(e){
    console.error('Receipt error:', e);
    container.innerHTML = `<div class="error-msg">Could not load order details: ${e.message}</div>
      <div class="section">
        <div class="section-title">What happened?</div>
        <p style="font-size:0.84rem;color:#6B7280;line-height:1.6;">Your payment was successful. If order details aren't showing, don't worry — your order is being processed. Contact <a href="mailto:support@wibilow.com" style="color:#2563EB;">support@wibilow.com</a> if you have questions.</p>
      </div>`;
  }
}
loadOrder();
</script>
</body>
</html>
